import { createElement as h, useEffect, useRef, useState } from "https://esm.sh/react@18";

function useInView(t=.06){
  const ref=useRef(null), [v,sv]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){sv(true);obs.disconnect();}},{threshold:t});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,v];
}
