version: "3.8"

services:
  server:
    image: ai-hackathon-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always

# note: since you are using upstash (cloud) and likely mongodb atlas (cloud), 
# this compose file just runs your server image and connects it to those 
# cloud services using your local .env file.
